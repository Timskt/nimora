name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Ubuntu quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: pnpm
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf
      - name: Reject unsupported package manager files
        shell: bash
        run: |
          if find . -type f \( -name package-lock.json -o -name npm-shrinkwrap.json -o -name yarn.lock -o -name bun.lock -o -name bun.lockb \) | grep -q .; then
            echo "Only pnpm-lock.yaml is allowed"
            exit 1
          fi
      - name: Check whitespace errors
        run: git diff --check HEAD^ HEAD || git diff --check
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: cargo fmt --all --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
