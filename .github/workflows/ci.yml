name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  rust:
    name: Rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: cargo fmt --all --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings

  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject unsupported package manager files
        shell: bash
        run: |
          if find . -type f \( -name package-lock.json -o -name npm-shrinkwrap.json -o -name yarn.lock -o -name bun.lock -o -name bun.lockb \) | grep -q .; then
            echo "Only pnpm-lock.yaml is allowed"
            exit 1
          fi
      - name: Check whitespace errors
        run: git diff --check HEAD^ HEAD || git diff --check

