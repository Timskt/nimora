<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f2ed" />
    <title>Nimora</title>
    <style>
      /* Avoid control-center canvas flash before React hydrates pet overlay. */
      html.pet-boot, html.pet-boot body, html.pet-boot #root {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        height: 100% !important;
        min-width: 0 !important;
        min-height: 0 !important;
        overflow: hidden !important;
        background: transparent !important;
        background-color: transparent !important;
        background-image: none !important;
        box-shadow: none !important;
        border: 0 !important;
      }
    </style>
    <script>
      (function () {
        try {
          if (new URLSearchParams(location.search).get("view") === "pet") {
            document.documentElement.classList.add("pet-boot");
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
